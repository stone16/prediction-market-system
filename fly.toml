app = "pms-paper-soak"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PMS_AUTO_START = "1"
  PMS_CONFIG_PATH = "/app/config.live-soak.yaml"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/readiness"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
