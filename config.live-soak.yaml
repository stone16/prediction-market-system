# Tight PAPER soak configuration for the first real-data risk-readiness run.
# Keep PAPER soak credentials out of config; LIVE Polymarket credentials must
# come from a chmod 600 local secret file with secret_source=local_file.

mode: paper
live_trading_enabled: false
live_account_reconciliation_required: true
live_emergency_audit_path: .data/live-emergency-audit.jsonl

risk:
  max_position_per_market: 5.0
  # Bumped 50 → 100 for paper soak day-2: 18 positions filled the original
  # $50 cap within 20 minutes on day-1, leaving 12+ hours of zero new fills
  # and only mark-to-market drift on existing positions. Doubling exposes
  # ~25 more position slots so the sample size approaches Gate 3 minimums.
  # **Lower this back to 50 before flipping mode=live** — first-live-order
  # tight envelope is the operator audit gate.
  max_total_exposure: 100.0
  max_drawdown_pct: 20.0
  # 60 slots is paper-only headroom paired with max_total_exposure=100:
  # $100 / $2 per fill (paper_multifactor max_position_notional_usdc=2.0)
  # caps the **real** open-position count at ~50, so 60 keeps a small
  # buffer. The dollar exposure cap above is the binding ceiling.
  # **Lower this back to 5 before flipping mode=live** — first-live-order
  # soak intentionally runs with a tiny concurrent fleet so the operator
  # can audit each fill.
  max_open_positions: 60
  min_order_usdc: 1.0
  # PAPER-only: align RiskManager with controller.max_slippage_bps below so
  # the 200bps paper fill band reaches PaperActuator. **Lower this back to 50
  # before flipping mode=live**; live execution keeps the tighter risk gate.
  slippage_threshold_bps: 200.0
  max_quantity_shares: 500.0

sensor:
  poll_interval_s: 5.0
  max_reconnect_interval_s: 60.0
  max_subscription_asset_ids: 100
  persist_discovery_price_snapshots: false
  persist_price_changes: false

controller:
  min_volume: 0.0
  # 200bps slippage band for PAPER sim against live Polymarket data:
  # typical small-market spreads on PM are 100-300bps, and the
  # PaperActuator applies max_slippage_bps as an effective-limit band
  # in _vwap_fill (see fix/paper-actuator-slippage-band). 50bps was
  # tight enough to keep fills near-zero through the 2026-05-03..05
  # paper soak. **Before flipping mode=live, lower this back to 50**
  # — the live planner does its own slippage gate via _violates_limit
  # and the wider band here is intentionally paper-only.
  max_slippage_bps: 200
  time_in_force: IOC
  decision_cooldown_s: 60.0
  max_book_age_ms: 1000.0
  allowed_book_clock_skew_ms: 250.0
  max_spread_bps: 100.0
  strict_factor_gates: false
  quote_source: postgres_snapshot
  direct_quote_min_notional_usdc: 100.0
  dual_quote_max_price_delta_bps: 25.0

calibration:
  shrinkage_factor: 0.35
  bias: 0.0
  extreme_clamp_low: 0.08
  extreme_clamp_high: 0.92
  min_resolved: 500

polymarket:
  host: https://clob.polymarket.com
  websocket_url: wss://ws-subscriptions-clob.polymarket.com/ws/
  chain_id: 137
  private_key: null
  api_key: null
  api_secret: null
  api_passphrase: null
  signature_type: null
  funder_address: null

llm:
  enabled: true
  provider: anthropic
  max_daily_llm_cost_usdc: 25.0
  # api_key, model, and base_url are intentionally omitted from the committed
  # YAML so the operator's .env or shell can choose between native Anthropic
  # and any Anthropic-compatible provider (DeepSeek's /anthropic endpoint,
  # OpenRouter, Bedrock proxies). Required env vars when running this config:
  #
  #   PMS_LLM__API_KEY    = "sk-..."                         (always required)
  #   PMS_LLM__MODEL      = "claude-sonnet-4-6"              (or e.g. DeepSeek-V4-Pro)
  #   PMS_LLM__BASE_URL   = ""                               (empty for native Anthropic;
  #                          "https://api.deepseek.com/anthropic" for DeepSeek)
  #
  # PMSSettings auto-loads .env in CWD via pydantic-settings (config.py:166).
  # Init args from YAML override env vars, so do NOT add model/api_key/base_url
  # back into this file unless you want to pin a single provider for everyone.
