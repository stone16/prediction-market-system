# sentence-transformers — open semantic embedding library.
# Catalog first-choice for embedding_engine. Already a transitive dep
# in pms via the embeddings sub-package; this candidate captures the
# canonical version we benchmark against.
name: sentence-transformers
repo: https://github.com/UKPLab/sentence-transformers
language: python
install: "pip install sentence-transformers==5.3.0"
platforms: [polymarket, kalshi]
module: embedding_engine
notes: "Best benchmarkable semantic baseline for market-title and description similarity. General-purpose; may benefit from task tuning."
config:
  package_name: sentence-transformers
  package_version: "5.3.0"
