# Mock candidate used by the harness's own self-tests.
# It is intentionally fake — it points at example.com and is wired to
# pms.tool_harness.MockCandidate at runtime.
name: mock_connector
repo: https://example.com/mock
# Special "mock" language tells the CLI to route this candidate to the
# in-process MockCandidate instead of spawning real subprocesses. Real
# tool candidates use python/typescript/rust/java.
language: mock
install: "echo mock install"
platforms: [polymarket, kalshi]
module: data_connector
notes: "Mock candidate for harness self-tests"
config:
  mock_markets: 150
  mock_latency_ms: 200
