# kalshi-python-sync — official Kalshi SDK (sync). Replaces deprecated
# kalshi-python starter SDK. Source repo is private (exchange-infra).
name: kalshi_python_sync
repo: https://github.com/Kalshi/exchange-infra
language: python
install: "pip install kalshi-python-sync==3.11.0"
platforms: [kalshi]
module: data_connector
notes: "Official sync successor to deprecated kalshi-python. Requires Python >=3.13. Source repo is private; sdist ships 162 pytest tests but wheel excludes them."
config:
  package_name: kalshi-python-sync
  package_version: "3.11.0"
  python_min_version: "3.13"
  repo_visibility: private
  package_license: "LicenseRef-Proprietary"
  last_updated: "2026-03-31"
  verdict: deeper-review
  auth_model: "RSA private key + API key ID"
