[project]
name = "pms"
version = "0.1.0"
description = "Prediction Market System — modular trading pipeline and tool harness"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "pms maintainers" }]
license = { text = "MIT" }
dependencies = []

[project.optional-dependencies]
# Empty for CP01 — concrete connector/embedding deps land in later checkpoints.

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["python/pms"]

# ---------------------------------------------------------------------------
# pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["python"]
asyncio_mode = "auto"
filterwarnings = ["error"]

# ---------------------------------------------------------------------------
# mypy — strict mode is required by CP01 acceptance criteria.
# ---------------------------------------------------------------------------
[tool.mypy]
mypy_path = "python"
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
disallow_any_unimported = false
namespace_packages = true
explicit_package_bases = true
