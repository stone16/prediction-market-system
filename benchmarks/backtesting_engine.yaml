# Benchmark for the backtesting_engine module.
#
# Survival gate: candidate must install, accept a fixture data feed,
# and run one deterministic backtest cycle to completion.
module: backtesting_engine
version: 1

survival_gate:
  - id: install
    test: "Candidate installs cleanly via the documented install command."
    timeout_seconds: 600
  - id: connect
    test: "Candidate accepts a fixture data feed (CSV or in-memory)."
    timeout_seconds: 30
  - id: fetch_one
    test: "Candidate runs one deterministic backtest cycle to completion."
    timeout_seconds: 120

functional_tests:
  data_coverage:
    weight: 0.25
    tests:
      - id: data_format_breadth
        test: "Distinct historical data formats the engine accepts."
        metric: count
        baseline: 2
        lower_is_better: false
      - id: venue_breadth
        test: "Number of venues with first-class adapter support."
        metric: count
        baseline: 1
        lower_is_better: false
      - id: deterministic_replay
        test: "Two consecutive runs over the same fixture produce identical PnL."
        metric: boolean
        baseline: 1
        lower_is_better: false

  performance:
    weight: 0.25
    tests:
      - id: events_per_second
        test: "Backtest events processed per wall-second on a 1M-event fixture."
        metric: count
        baseline: 50000
        lower_is_better: false
      - id: memory_overhead
        test: "Peak resident memory while replaying the 1M-event fixture (MB)."
        metric: count
        baseline: 1024
        lower_is_better: true

  integrability:
    weight: 0.25
    tests:
      - id: returns_pms_metrics
        test: "Backtest output maps cleanly onto pms.models metrics shapes."
        metric: boolean
        baseline: 1
        lower_is_better: false
      - id: pluggable_strategies
        test: "Engine accepts user-defined strategies without forking the package."
        metric: boolean
        baseline: 1
        lower_is_better: false

  code_quality:
    weight: 0.25
    tests:
      - id: has_tests
        test: "Repository ships an automated test suite for the backtest path."
        metric: boolean
        baseline: 1
        lower_is_better: false
      - id: recently_maintained
        test: "Days since the last commit on the default branch."
        metric: days
        baseline: 90
        lower_is_better: true
