# Benchmark for the data_connector module.
#
# Survival gate: a candidate must install, connect to at least one
# supported platform, and successfully fetch a single market before any
# functional scoring happens. If any survival item fails, the candidate
# is rejected outright.
#
# Functional tests are grouped into four equally weighted categories
# (each 0.25). Inside each category, every test contributes equally to
# the category's score; the runner then computes a weighted overall.
module: data_connector
version: 1

survival_gate:
  - id: install
    test: "Candidate installs cleanly via the documented install command."
    timeout_seconds: 300
  - id: connect
    test: "Candidate establishes a connection to at least one supported platform."
    timeout_seconds: 30
  - id: fetch_one
    test: "Candidate fetches at least one market record end-to-end."
    timeout_seconds: 60

functional_tests:
  data_coverage:
    weight: 0.25
    tests:
      - id: market_count
        test: "Total markets returned across supported platforms."
        metric: count
        baseline: 50
        lower_is_better: false
      - id: platform_breadth
        test: "Number of platforms successfully queried in one run."
        metric: count
        baseline: 2
        lower_is_better: false
      - id: field_completeness
        test: "Fraction of returned markets with all required fields populated."
        metric: percentage
        baseline: 0.95
        lower_is_better: false

  performance:
    weight: 0.25
    tests:
      - id: fetch_latency
        test: "Median time to fetch a single market."
        metric: ms
        baseline: 500
        lower_is_better: true
      - id: bulk_throughput
        test: "Markets fetched per second during a 60s bulk pull."
        metric: count
        baseline: 10
        lower_is_better: false

  integrability:
    weight: 0.25
    tests:
      - id: returns_pms_market
        test: "Adapter output maps cleanly onto pms.models.Market."
        metric: boolean
        baseline: 1
        lower_is_better: false
      - id: stable_api
        test: "Public API surface unchanged across two consecutive minor versions."
        metric: boolean
        baseline: 1
        lower_is_better: false

  code_quality:
    weight: 0.25
    tests:
      - id: has_tests
        test: "Repository ships an automated test suite."
        metric: boolean
        baseline: 1
        lower_is_better: false
      - id: recently_maintained
        test: "Days since the last commit on the default branch."
        metric: days
        baseline: 90
        lower_is_better: true
