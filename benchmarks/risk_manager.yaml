# Benchmark for the risk_manager module.
#
# Survival gate: candidate must install, accept a sample portfolio +
# proposed order, and return a structured pre-trade decision.
module: risk_manager
version: 1

survival_gate:
  - id: install
    test: "Candidate installs cleanly via the documented install command."
    timeout_seconds: 300
  - id: connect
    test: "Candidate accepts a sample portfolio + proposed order as input."
    timeout_seconds: 10
  - id: fetch_one
    test: "Candidate returns a structured pre-trade risk decision."
    timeout_seconds: 30

functional_tests:
  data_coverage:
    weight: 0.25
    tests:
      - id: control_breadth
        test: "Distinct risk controls available (max position, exposure, drawdown, etc.)."
        metric: count
        baseline: 3
        lower_is_better: false
      - id: handles_partial_fills
        test: "Risk manager updates exposure correctly on partial fills."
        metric: boolean
        baseline: 1
        lower_is_better: false
      - id: position_sizing
        test: "Provides at least one position-sizing helper (Kelly, fixed-fraction, etc.)."
        metric: boolean
        baseline: 1
        lower_is_better: false

  performance:
    weight: 0.25
    tests:
      - id: pre_trade_latency
        test: "Median wall-time to evaluate one proposed order."
        metric: ms
        baseline: 10
        lower_is_better: true
      - id: bulk_throughput
        test: "Pre-trade evaluations per second on a 10k-order fixture."
        metric: count
        baseline: 1000
        lower_is_better: false

  integrability:
    weight: 0.25
    tests:
      - id: returns_pms_risk_decision
        test: "Risk manager output maps cleanly onto pms.models.RiskDecision."
        metric: boolean
        baseline: 1
        lower_is_better: false
      - id: pure_function
        test: "Risk evaluation is side-effect-free given an explicit portfolio snapshot."
        metric: boolean
        baseline: 1
        lower_is_better: false

  code_quality:
    weight: 0.25
    tests:
      - id: has_tests
        test: "Repository ships an automated test suite for the risk path."
        metric: boolean
        baseline: 1
        lower_is_better: false
      - id: recently_maintained
        test: "Days since the last commit on the default branch."
        metric: days
        baseline: 90
        lower_is_better: true
