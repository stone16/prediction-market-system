# Benchmark for the data_normalizer module.
#
# Survival gate: candidate must install, accept a sample raw payload
# from at least one venue, and emit a normalized record without
# dropping required fields.
module: data_normalizer
version: 1

survival_gate:
  - id: install
    test: "Candidate installs cleanly via the documented install command."
    timeout_seconds: 300
  - id: connect
    test: "Candidate accepts a sample raw payload from at least one venue."
    timeout_seconds: 10
  - id: fetch_one
    test: "Candidate emits one normalized record retaining all required fields."
    timeout_seconds: 30

functional_tests:
  data_coverage:
    weight: 0.25
    tests:
      - id: venue_breadth
        test: "Number of venues with a documented normalizer adapter."
        metric: count
        baseline: 1
        lower_is_better: false
      - id: schema_completeness
        test: "Fraction of pms.models.Market fields populated from a typical raw payload."
        metric: percentage
        baseline: 0.9
        lower_is_better: false
      - id: handles_partial_payloads
        test: "Normalizer tolerates missing optional fields without raising."
        metric: boolean
        baseline: 1
        lower_is_better: false

  performance:
    weight: 0.25
    tests:
      - id: normalize_latency
        test: "Median wall-time to normalize one raw payload."
        metric: ms
        baseline: 5
        lower_is_better: true
      - id: bulk_throughput
        test: "Records normalized per second on a 10k-record fixture."
        metric: count
        baseline: 5000
        lower_is_better: false

  integrability:
    weight: 0.25
    tests:
      - id: returns_pms_market
        test: "Normalizer output maps cleanly onto pms.models.Market."
        metric: boolean
        baseline: 1
        lower_is_better: false
      - id: deterministic_output
        test: "Same input produces byte-identical output across runs."
        metric: boolean
        baseline: 1
        lower_is_better: false

  code_quality:
    weight: 0.25
    tests:
      - id: has_tests
        test: "Repository ships an automated test suite for the normalizer."
        metric: boolean
        baseline: 1
        lower_is_better: false
      - id: recently_maintained
        test: "Days since the last commit on the default branch."
        metric: days
        baseline: 90
        lower_is_better: true
