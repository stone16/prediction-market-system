# Benchmark for the order_executor module.
#
# Survival gate: candidate must install, authenticate against a
# supported venue (or demo endpoint), and round-trip a single test
# order through the venue's order lifecycle (place + cancel). Probes
# that lack credentials must exit 2 so the harness reports
# "missing credentials" rather than a generic failure.
module: order_executor
version: 1

survival_gate:
  - id: install
    test: "Candidate installs cleanly via the documented install command."
    timeout_seconds: 300
  - id: connect
    test: "Candidate authenticates with at least one supported venue (or demo endpoint)."
    timeout_seconds: 30
  - id: fetch_one
    test: "Candidate places and cancels one zero-impact test order end-to-end."
    timeout_seconds: 60

functional_tests:
  data_coverage:
    weight: 0.25
    tests:
      - id: order_type_breadth
        test: "Distinct order types the executor supports (limit, market, IOC, etc.)."
        metric: count
        baseline: 2
        lower_is_better: false
      - id: platform_breadth
        test: "Number of platforms the executor can target in one process."
        metric: count
        baseline: 1
        lower_is_better: false
      - id: idempotency_supported
        test: "Executor supports client-side idempotency keys / retry-safe submission."
        metric: boolean
        baseline: 1
        lower_is_better: false

  performance:
    weight: 0.25
    tests:
      - id: order_latency
        test: "Median wall-time from submit() to venue ack."
        metric: ms
        baseline: 800
        lower_is_better: true
      - id: cancel_latency
        test: "Median wall-time from cancel() to venue ack."
        metric: ms
        baseline: 800
        lower_is_better: true

  integrability:
    weight: 0.25
    tests:
      - id: returns_pms_order_result
        test: "Executor output maps cleanly onto pms.models.OrderResult."
        metric: boolean
        baseline: 1
        lower_is_better: false
      - id: error_taxonomy
        test: "Distinct, structured error types instead of stringly-typed failures."
        metric: boolean
        baseline: 1
        lower_is_better: false

  code_quality:
    weight: 0.25
    tests:
      - id: has_tests
        test: "Repository ships an automated test suite for the order lifecycle."
        metric: boolean
        baseline: 1
        lower_is_better: false
      - id: recently_maintained
        test: "Days since the last commit on the default branch."
        metric: days
        baseline: 90
        lower_is_better: true
