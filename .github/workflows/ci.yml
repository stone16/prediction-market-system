name: CI

on:
  pull_request:
  push:
    branches:
      - "feat/**"
      - "fix/**"
      - "docs/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      # Keep this tag in sync with compose.yml.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pms_test"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Sync dependencies
        run: uv sync

      - name: Run default pytest suite
        run: uv run pytest -q

      - name: Run PostgreSQL integration tests
        env:
          PMS_RUN_INTEGRATION: "1"
          PMS_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/pms_test
        run: >
          uv run pytest -q
          tests/integration/test_schema_apply_outer.py
          tests/integration/test_schema_apply_inner.py
          tests/integration/test_db_conn_rollback.py
          tests/integration/test_runner_pool_integration.py

      - name: Run mypy
        run: uv run mypy src/ tests/ --strict

      - name: Run import-linter
        run: uv run lint-imports
